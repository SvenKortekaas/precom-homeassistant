name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(jq -r '.version' custom_components/precom/manifest.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json versie ($MANIFEST_VERSION) komt niet overeen met tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build precom.zip
        run: |
          cd custom_components/precom
          zip -r ../../precom.zip .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: precom.zip
          generate_release_notes: true
